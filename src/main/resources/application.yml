spring:
  application:
    name: tech-egg-mart-v5
  datasource:
    url: jdbc:h2:mem:teg;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ''
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        # Scan for entity classes under the base package
        packages_to_scan: com.techegg.domain
server:
  port: ${PORT:8080}
