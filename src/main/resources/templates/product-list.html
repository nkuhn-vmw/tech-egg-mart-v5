<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Product Listing</title>
    <!-- Bootstrap CSS (via CDN) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-ENjdO4Dr2bkBIFxQpeoYz1K4O2U5F2E2Vn1E6Y9bV7V0e1JkK6u3+F9eF6c8w5V" crossorigin="anonymous" />
    <style>
        .product-card {
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            padding: 1rem;
            margin-bottom: 1rem;
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        .product-image {
            max-height: 150px;
            object-fit: contain;
            margin-bottom: 0.5rem;
        }
        .product-info {
            flex-grow: 1;
        }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <!-- Sidebar Filters -->
        <nav class="col-md-3 col-lg-2 d-md-block bg-light sidebar collapse">
            <div class="position-sticky pt-3">
                <h5 class="px-3">Categories</h5>
                <ul class="nav flex-column">
                    <li class="nav-item" th:each="cat : ${categories}">
                        <a class="nav-link" th:href="@{/products(categoryId=${cat.id})}" th:text="${cat.name}"></a>
                    </li>
                </ul>
                <hr />
                <h5 class="px-3">Price Filter</h5>
                <form class="px-3" th:action="@{/products}" method="get">
                    <input type="hidden" name="categoryId" th:value="${selectedCategoryId}" />
                    <div class="mb-2">
                        <label for="minPrice" class="form-label">Min</label>
                        <input type="number" step="0.01" class="form-control" id="minPrice" name="minPrice" th:value="${minPrice}" placeholder="0" />
                    </div>
                    <div class="mb-2">
                        <label for="maxPrice" class="form-label">Max</label>
                        <input type="number" step="0.01" class="form-control" id="maxPrice" name="maxPrice" th:value="${maxPrice}" placeholder="1000" />
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Apply</button>
                </form>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
            <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 g-3 mt-3">
                <div class="col" th:each="product : ${products}">
                    <div class="product-card">
                        <img th:if="${product.imageUrl}" th:src="@{${product.imageUrl}}" class="product-image img-fluid" alt="Product Image" />
                        <div class="product-info">
                            <h5 th:text="${product.name}"></h5>
                            <p class="text-muted" th:text="${product.shortDescription}"></p>
                        </div>
                        <div class="mt-auto">
                            <p class="fw-bold" th:text="${#numbers.formatDecimal(product.price, 2, 'COMMA', '.', 'USD')}"></p>
                            <a th:href="@{'/products/' + ${product.id}}" class="btn btn-sm btn-outline-secondary w-100">View Details</a>
                        </div>
                    </div>
                </div>
                <div th:if="${#lists.isEmpty(products)}" class="col-12">
                    <p class="text-center">No products found for the selected criteria.</p>
                </div>
            </div>
        </main>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+3U5j0K5M5gJjF5Q5LR5U5E5Y5c5I" crossorigin="anonymous"></script>
</body>
</html>
