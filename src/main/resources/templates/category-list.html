<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Category Listing</title>
    <!-- Bootstrap CSS (you can replace with your own styling approach) -->
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.0/css/bootstrap.min.css}" />
    <style>
        .category-card {
            margin-bottom: 1rem;
        }
        .product-card {
            margin-bottom: 1.5rem;
        }
        .category-nav {
            position: sticky;
            top: 1rem;
        }
    </style>
</head>
<body>
<div class="container-fluid mt-4">
    <div class="row">
        <!-- Category navigation column -->
        <nav class="col-md-3 col-lg-2 d-none d-md-block bg-light category-nav p-3">
            <h5 class="mb-3">Categories</h5>
            <ul class="list-group">
                <li class="list-group-item" th:each="cat : ${categories}" th:classappend="${cat.id == selectedCategoryId} ? 'active'">
                    <a th:href="@{'/categories/' + ${cat.slug}}" th:text="${cat.name}"></a>
                </li>
            </ul>
        </nav>

        <!-- Products listing column -->
        <main class="col-md-9 col-lg-10">
            <div class="row">
                <div class="col-12 mb-3">
                    <h2 th:text="${selectedCategoryName != null} ? ${selectedCategoryName} : 'All Products'"></h2>
                </div>
            </div>
            <div class="row" th:if="${#lists.isEmpty(products)}">
                <div class="col-12">
                    <p class="text-muted">No products found for this category.</p>
                </div>
            </div>
            <div class="row" th:unless="${#lists.isEmpty(products)}">
                <div class="col-sm-6 col-md-4 col-lg-3" th:each="product : ${products}">
                    <div class="card product-card h-100">
                        <img th:if="${product.imageUrl != null}" th:src="@{${product.imageUrl}}" class="card-img-top" alt="Product image" />
                        <div class="card-body d-flex flex-column">
                            <h5 class="card-title" th:text="${product.name}"></h5>
                            <p class="card-text text-truncate" th:text="${product.shortDescription != null ? product.shortDescription : product.description}"></p>
                            <div class="mt-auto">
                                <span class="fw-bold" th:text="${#numbers.formatDecimal(product.price, 1, 'COMMA', 2, 'POINT')}"></span>
                                <a th:href="@{'/products/' + ${product.id}}" class="btn btn-sm btn-primary float-end">View</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>

<!-- Bootstrap JS (optional) -->
<script th:src="@{/webjars/bootstrap/5.3.0/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
