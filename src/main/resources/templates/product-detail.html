<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title th:text="${product.name}">Product Detail</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.2/css/bootstrap.min.css}" />
</head>
<body>
<div class="container mt-4">
    <div class="row">
        <div class="col-md-5">
            <img th:src="@{${product.imageUrl}}" class="img-fluid" alt="Product Image" />
        </div>
        <div class="col-md-7">
            <h2 th:text="${product.name}">Product Name</h2>
            <p class="text-muted" th:text="${product.brand}">Brand</p>
            <h4 class="text-success" th:text="${#numbers.formatDecimal(product.price, 1, 'COMMA', 2, 'POINT')}">$0.00</h4>
            <p th:text="${product.description}">Description</p>
            <p><strong>Model:</strong> <span th:text="${product.model}">Model</span></p>
            <p><strong>Specifications:</strong></p>
            <p th:text="${product.specifications}">Specs</p>
            <p><strong>Stock:</strong> <span th:text="${product.stockQuantity}">0</span></p>
            <p><strong>Rating:</strong> <span th:text="${product.rating}">0</span> / 5</p>
            <form th:action="@{/cart/add}" method="post" class="mt-3">
                <input type="hidden" name="productId" th:value="${product.id}" />
                <div class="mb-3">
                    <label for="quantity" class="form-label">Quantity</label>
                    <input type="number" class="form-control" id="quantity" name="quantity" value="1" min="1" th:max="${product.stockQuantity}" />
                </div>
                <button type="submit" class="btn btn-primary">Add to Cart</button>
            </form>
        </div>
    </div>
    <hr/>
    <div th:replace="fragments/navbar :: navbar"></div>
</div>
<script th:src="@{/webjars/bootstrap/5.3.2/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
