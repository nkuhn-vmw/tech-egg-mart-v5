<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title th:text="${product.name}">Product Detail</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-ENjdO4Dr2bkBIFxQpeoYz1K4O2U5F2E2Vn1E6Y9bV7V0e1JkK6u3+F9eF6c8w5V" crossorigin="anonymous" />
    <style>
        .product-image {
            max-width: 100%;
            height: auto;
        }
        .review-card {
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            padding: 1rem;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <header th:replace="fragments/header :: header"></header>
<div class="container mt-4">
    <div class="row">
        <div class="col-md-6">
            <img th:if="${product.imageUrl}" th:src="@{${product.imageUrl}}" class="product-image img-fluid" alt="Product Image" />
        </div>
        <div class="col-md-6">
            <h2 th:text="${product.name}"></h2>
            <p class="text-muted" th:text="${product.shortDescription}"></p>
            <h4 class="mt-3" th:text="${#numbers.formatDecimal(product.price, 2, 'COMMA', '.', 'USD')}"></h4>
            <p th:if="${product.originalPrice != null}" class="text-muted text-decoration-line-through" th:text="${#numbers.formatDecimal(product.originalPrice, 2, 'COMMA', '.', 'USD')}"></p>
            <p th:text="${product.longDescription}"></p>
            <p><strong>Rating:</strong> <span th:text="${product.rating != null ? product.rating : 'No ratings'}"></span> (<span th:text="${product.reviewCount != null ? product.reviewCount : 0"></span> reviews)</p>
        </div>
    </div>

    <hr />
    <h3 class="mt-4">Reviews</h3>
    <div th:if="${#lists.isEmpty(reviews)}">
        <p>No reviews yet. Be the first to review this product!</p>
    </div>
    <div th:each="review : ${reviews}" class="review-card">
        <strong th:text="${review.reviewerName}"></strong>
        <span class="ms-2">Rating: <span th:text="${review.rating}"></span>/5</span>
        <p class="mt-2" th:text="${review.comment}"></p>
        <small class="text-muted" th:text="${#temporals.format(review.date, 'yyyy-MM-dd HH:mm')}"></small>
    </div>

    <hr />
    <h4>Add a Review</h4>
    <form th:action="@{'/products/' + ${product.id} + '/reviews'}" method="post">
        <div class="mb-3">
            <label for="reviewerName" class="form-label">Your Name</label>
            <input type="text" class="form-control" id="reviewerName" name="reviewerName" required />
        </div>
        <div class="mb-3">
            <label for="rating" class="form-label">Rating</label>
            <select class="form-select" id="rating" name="rating" required>
                <option th:each="i : ${#numbers.sequence(1,5)}" th:value="${i}" th:text="${i}"></option>
            </select>
        </div>
        <div class="mb-3">
            <label for="comment" class="form-label">Comment</label>
            <textarea class="form-control" id="comment" name="comment" rows="3" required></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Submit Review</button>
    </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+3U5j0K5M5gJjF5Q5LR5U5E5Y5c5I" crossorigin="anonymous"></script>
</body>
</html>
