<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Products</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.2/css/bootstrap.min.css}" />
</head>
<body>
<div class="container mt-4">
    <h2>Product List</h2>
    <div class="row">
        <div class="col-12" th:if="${#lists.isEmpty(products)}">
            <p>No products available.</p>
        </div>
        <div class="col-md-4 mb-4" th:each="product : ${products}">
            <div class="card h-100">
                <div class="card-body">
                    <h5 class="card-title" th:text="${product.name}">Product Name</h5>
                    <p class="card-text" th:text="${product.description}">Description</p>
                    <p class="card-text"><strong>Price:</strong> $<span th:text="${product.price}">0.00</span></p>
                    <p class="card-text"><strong>Category:</strong> <span th:text="${product.category}">Category</span></p>
                    <p class="card-text"><strong>Stock:</strong> <span th:text="${product.stockQuantity}">0</span></p>
                </div>
            </div>
        </div>
    </div>
    <a class="btn btn-primary mt-3" th:href="@{/}">Back to Home</a>
</div>
<script th:src="@{/webjars/bootstrap/5.3.2/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
